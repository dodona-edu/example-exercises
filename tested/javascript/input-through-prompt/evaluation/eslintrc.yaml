extends: "eslint:recommended"
env:
  node: yes
  es2020: yes
globals:
  prompt: "readonly"
rules:
    no-var: "warn"
    semi: "warn"
    no-unused-vars: ["off", { "vars": "local", "args": "after-used", "ignoreRestSiblings": false }]
parserOptions:
    ecmaVersion: "latest"
    sourceType: "script"
    ecmaFeatures: {}
